<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiến Trúc Thực Tại - Bức Màn Ảo Giác</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }

        .abstract-blob { animation: float 10s infinite alternate ease-in-out; }
        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-20px) scale(1.05); }
        }
        /* Custom scrollbar for aesthetic */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

</head>
<body class="bg-[#F8FAFC] text-slate-800 antialiased selection:bg-indigo-200 flex flex-col min-h-screen">
    <div id="root" class="flex-grow flex flex-col"></div>

    <script type="text/babel">
        // ================= DATA =================
        const mindmapData = [
            {
                title: "1. Thực tại Giao diện (The Interface Reality)",
                logic: "Không gian, thời gian và vật chất không phải là nền tảng khách quan, chúng chỉ là 'giao diện người dùng' (Desktop Interface).",
                explanation: "Tiến hóa & Thần kinh học: Thuyết tiến hóa chứng minh sinh vật dành tài nguyên để 'thấy chân lý' sẽ có xác suất sống sót là 0%. Não bộ tối ưu năng lượng bằng cách mã hóa các biến số lượng tử phức tạp thành 'biểu tượng vật lý' (như icon trên màn hình) để phục vụ duy nhất cho sinh tồn."
            },
            {
                title: "2. Nút thắt Năng lượng Nhận thức",
                logic: "Việc xử lý sự thật tuyệt đối tốn kém quá mức về mặt nhiệt động học, làm suy giảm năng lực duy trì nòi giống.",
                explanation: "Ràng buộc Sinh lý: Bộ não chỉ chiếm 2% khối lượng nhưng tiêu thụ 20% calorie. Cơ chế chọn lọc tự nhiên sinh ra các 'bộ lọc ảo giác' (hacks) ép hệ thần kinh phản ứng nhanh với hiểm họa, thay vì tiêu tốn năng lượng để xử lý độ phân giải thực của vũ trụ."
            },
            {
                title: "3. Ảo tưởng Đại diện (Avatar Identification)",
                logic: "Cái tôi, cơ thể và bản dạng xã hội (Avatar) không phải là bạn. Bạn là người chơi đang đeo kính thực tế ảo.",
                explanation: "Tâm lý học Tiến hóa: Hệ thống Default Mode Network (DMN) trong não liên tục dựng lên câu chuyện về cái tôi để kích hoạt cơ chế phòng vệ và cạnh tranh vị thế, đánh lừa Ý thức rằng nó chính là 'nhân vật' giới hạn này để tối đa hóa khả năng sinh sản."
            },
            {
                title: "4. Ý thức Hợp nhất (The One Consciousness)",
                logic: "Chỉ có một Bản thể Ý thức vô hạn đang trải nghiệm vô số góc nhìn qua các Avatar khác nhau (từ con người đến vi sinh vật).",
                explanation: "Logic Thuật toán: Phủ định 'Vật chất sinh ra Ý thức' (vô lý vì không có thuật toán chuyển hóa nơ-ron thành trải nghiệm). Lý thuyết đảo ngược: 'Ý thức là Nền tảng sinh ra vật chất'. Khác biệt giữa các sinh vật chỉ là băng thông dữ liệu của từng 'headset'."
            },
            {
                title: "5. Định lý Bất toàn của Khoa học Vật chất",
                logic: "Khoa học hiện đại mô tả vật lý xuất sắc, nhưng tỷ lệ khám phá bản chất cốt lõi thực tại của nó mãi mãi là 0%.",
                explanation: "Logic Cấu trúc Hệ thống: Khoa học vật lý bị nhốt bên trong hệ quy chiếu không-thời gian. Bất kỳ phương trình nào (kể cả Lượng tử hay Tương đối) cũng chỉ đang giải mã quy tắc nội bộ của 'phần mềm', không thể chạm tới 'phần cứng' hay mã nguồn nằm ngoài hệ thống."
            },
            {
                title: "6. Kiến trúc của Đau khổ (Architecture of Suffering)",
                logic: "Đau khổ tinh thần và thể xác không phải lỗi hệ thống, mà là thuật toán phản hồi (feedback mechanism) ép Avatar sinh tồn.",
                explanation: "Thần kinh học & Sinh lý: Nỗi đau là 'biến số ép buộc' được lập trình để Avatar không tự hủy. Phân biệt rõ: Nỗi đau vật lý là tín hiệu thuần túy; sự 'Khổ tâm' (Suffering) xảy ra khi Ý thức bám víu và ảo tưởng về tính toàn vẹn của Avatar."
            },
            {
                title: "7. Phương trình Tình yêu Vô điều kiện",
                logic: "Yêu thương kẻ thù không phải là bài học đạo đức sáo rỗng, mà là logic tất yếu của toán học mạng lưới hệ thống.",
                explanation: "Cơ chế Mạng lưới (Network Theory): Khi nhận ra mọi thực thể đều là Node của cùng một Source Code, việc cạnh tranh độc hại với người khác tương đương với việc tay trái đâm tay phải. Tình yêu vô điều kiện là thuật toán tối ưu triệt tiêu nội ma sát của hệ thống."
            },
            {
                title: "8. Quyền năng của Sự Tĩnh lặng Tuyệt đối",
                logic: "Cách duy nhất để thoát khỏi giới hạn của Giao diện là ngừng sử dụng công cụ mã hóa của nó: Khái niệm và Ngôn ngữ.",
                explanation: "Tối ưu Hệ thống Nhận thức: Ngôn ngữ là lớp mã hóa hạ tầng phục vụ sinh tồn. Đưa não về trạng thái 'Awareness without content' (Nhận thức trống) qua thiền định giúp vượt tường lửa của não, kết nối trực tiếp với băng thông của Ý thức nền tảng."

            },
            {
                title: "10. Kỷ nguyên Hack Không-Thời gian",
                logic: "Nắm được bộ luật của 'Ngoại thực tại' sẽ tạo ra bước nhảy vọt công nghệ vượt qua ranh giới vật lý, tiệm cận phép thuật.",

            },
            {
                title: "Thông số Vô ngã (Ego-killer Parameter)",
                content: "Khi xuất hiện thôi thúc muốn chứng tỏ hoặc tranh cãi, chạy tham số 'Quy mô 1000 năm'. Công thức: Xác suất ý nghĩa của sự kiện/danh tính này đối với nguồn cội Ý thức trong thiên niên kỷ tới là 0%. Hành động ngay: Hủy bỏ phản xạ phòng vệ bản ngã, bảo toàn tài nguyên não bộ."
            },
            {
                title: "Giao thức Thiền Rỗng (Concept-less Override)",
                content: "Thiết lập block time 1-3 giờ mỗi ngày chặn đứng dòng chảy khái niệm. Không dùng mantra, không phân tích, không định danh cảm giác. Đưa tỷ lệ 'Noise/Signal' của dòng ý nghĩ về 0 để ép hệ thần kinh reboot và tiếp xúc với 'Awareness without content'."
            },
            {
                title: "Thuật toán Đồng cảm Hệ thống (Systemic Empathy)",
                content: "Định dạng lại kẻ chống đối: Kẻ thù = [Cùng Bản thể Ý thức gốc] + [Giao diện/Avatar khác] + [Cơ sở dữ liệu môi trường sai lệch]. Output bắt buộc: Ngừng tấn công vật lý/ngôn từ, thấu hiểu cấu trúc lỗi của họ để tìm ra điểm cân bằng tối ưu hóa hệ thống."
            }
        ];

        const flashcards = [
            {q: "Thực tại ta đang thấy là gì?", a: "Là giao diện người dùng (VR headset) do tiến hóa thiết kế nhằm che giấu thực tại lượng tử."},
            {q: "Mục đích của Không-thời gian?", a: "Tối ưu hóa khả năng sinh tồn và sinh sản, không phải để hiển thị chân lý."},
            {q: "Tại sao ta không thấy sự thật?", a: "Nhận thức sự thật tốn quá nhiều năng lượng não bộ, gây giảm sút nghiêm trọng lợi thế cạnh tranh."},
            {q: "Vật chất có tồn tại độc lập?", a: "Không. Chỉ được 'render' (kết xuất) vào giao diện khi có sự quan sát của Ý thức."},
            {q: "Ý thức hay Não bộ có trước?", a: "Ý thức sinh ra không-thời gian. Não bộ chỉ là 'icon' đại diện của Ý thức trong giao diện."},
            {q: "Bản chất cái tôi (Ego) là gì?", a: "Sự đồng nhất hóa sai lầm của Ý thức vào tính toàn vẹn của Avatar sinh tồn."},
            {q: "Đau khổ tinh thần đến từ đâu?", a: "Từ việc quên mình là Người lập trình, quá đắm chìm vào những nỗi sợ mất mát của Avatar."},
            {q: "Bạn thực sự là ai?", a: "Một Ý thức siêu việt vô hạn (Transcendent Consciousness), vượt ngoài không gian và thời gian."},
            {q: "Ý thức tạo Avatar để làm gì?", a: "Để tự trải nghiệm chính mình thông qua vô số góc nhìn và những giới hạn giả lập."},
            {q: "Logic của Tình yêu Vô điều kiện?", a: "Người khác là chính bạn dưới một lớp vỏ Avatar khác (cùng xuất phát từ một Source Code)."},
            {q: "Khoa học vật lý giải thích bao nhiêu % thực tại?", a: "0%. Nó chỉ nghiên cứu và đo lường các quy tắc nội bộ bên trong Giao diện sinh tồn."},
            {q: "Phán xét người khác có nghĩa là gì?", a: "Là bạn đang tự tấn công và chia rẽ một phần mã nguồn của chính bản thân mình."},
            {q: "Ý nghĩa của nỗi đau thể xác?", a: "Là thuật toán phản hồi gốc (feedback mechanism) để bảo vệ cơ thể (Avatar) khỏi nguy cơ diệt vong."},
            {q: "Cái chết thực chất là gì?", a: "Khoảnh khắc Ý thức tháo bỏ Giao diện (Avatar), trở về với băng thông nguyên bản."},
            {q: "Nguồn gốc sự tự ti, cạnh tranh?", a: "Dùng thước đo hữu hạn của game sinh tồn để đánh giá giá trị của Bản thể vô hạn."},
            {q: "Cách vượt qua Giao diện thực tại?", a: "Dùng sự tĩnh lặng tuyệt đối (Thiền phi khái niệm) để dập tắt mọi thuật toán ngôn ngữ."},
            {q: "Vũ trụ thực sự cấu tạo từ gì?", a: "Từ Mạng lưới các Đại lý Ý thức (Conscious Agent Network) tương tác qua chuỗi Markov."},
            {q: "Mô hình AI hiện tại có ý thức không?", a: "Không, chúng chỉ là cỗ máy tính toán và thống kê tương quan dữ liệu siêu cấp."},
            {q: "Công nghệ tương lai nếu bẻ khóa Ý thức?", a: "Thao tác trực tiếp mã nguồn, vượt mọi giới hạn vật lý (như dịch chuyển tức thời)."},
            {q: "Vì sao gọi vật chất là 'biểu tượng'?", a: "Giống như icon folder không chứa vi mạch máy tính, vật chất ẩn giấu sự phức tạp thực sự."},
            {q: "Lỗi của diễn ngôn Tiến hóa truyền thống?", a: "Tin rằng tiến hóa làm não người tiệm cận sự thật, trong khi nó chỉ che giấu sự thật."},
            {q: "Động vật có ảo giác giao diện không?", a: "Có. (VD: Bọ cánh cứng Úc giao phối với vỏ chai vì hệ thống nhận nhầm mã màu sinh sản)."},

            {q: "Thái độ trước nghịch cảnh cuộc đời?", a: "Say YES. Không kháng cự, chấp nhận đây là cấu trúc data mà Ý thức tối cao muốn thu thập."},
            {q: "Bước đầu thoát khỏi Ma trận tâm lý?", a: "Thừa nhận mọi danh tính, chức vụ của bạn đều chỉ là lý thuyết hư cấu của Avatar."}

                <div className="absolute top-[20%] right-[0%] w-[40vw] h-[40vw] rounded-full bg-gradient-to-bl from-cyan-100 to-emerald-100 blur-3xl mix-blend-multiply opacity-50 abstract-blob" style={{animationDelay: '2s'}}></div>

        const AbstractArtCard = ({ index }) => {

        };

        const AbstractArtDark = () => (
            <div className="absolute inset-0 z-0 overflow-hidden pointer-events-none">
                <div className="absolute -bottom-1/2 left-1/4 w-full h-full bg-gradient-to-t from-red-900/20 to-transparent blur-3xl transform -rotate-45"></div>
                <div className="absolute top-0 right-0 w-1/2 h-full bg-gradient-to-b from-orange-600/10 to-transparent blur-3xl"></div>
            </div>
        );

        const App = () => {
            return (
                <div className="w-full h-full flex flex-col flex-grow">
                    
                    {/* Header / Hero Section */}
                    <header className="relative w-full py-24 px-6 lg:px-24 flex flex-col items-center text-center border-b border-slate-200 bg-white">
                        <AbstractArtHero />
                        <div className="relative z-10 max-w-4xl mx-auto">
                            <span className="inline-block py-1 px-3 rounded-full bg-indigo-50 text-indigo-600 text-xs font-bold tracking-widest uppercase mb-6 shadow-sm border border-indigo-100">
                                Information Architecture
                            </span>
                            <h1 className="text-4xl md:text-6xl font-extrabold tracking-tight text-slate-900 mb-8 leading-tight">
                                Giải Mã Thực Tại <br/>
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600">
                                    & Sự Thức Tỉnh Của Ý Thức
                                </span>
                            </h1>
                            <div className="glass-panel p-8 md:p-10 rounded-3xl shadow-2xl relative overflow-hidden text-left">
                                <div className="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-indigo-500 to-purple-500"></div>
                                <h2 className="text-sm font-black uppercase tracking-widest text-indigo-600 mb-4 flex items-center gap-2">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                    [Thesis] Luận điểm cốt lõi

                                <p className="text-lg md:text-xl font-medium text-slate-700 leading-relaxed">
                                    Không gian, thời gian và vật chất không phải là thực tại khách quan mà chỉ là một <strong className="text-slate-900">"giao diện sinh tồn" (VR headset)</strong> được tiến hóa thiết kế nhằm che giấu sự thật cốt lõi. Nhận ra ảo giác này sẽ giải phóng chúng ta khỏi sự thống trị của cái tôi, xóa bỏ căn nguyên đau khổ và mở ra kết nối với Ý thức vô hạn.
                                </p>
                            </div>
                        </div>
                    </header>

                    {/* Mindmap Section */}

                            <h2 className="text-3xl md:text-4xl font-bold text-slate-900 mb-4">10 Danh Mục Cốt Lõi</h2>

                        </div>

<script id="cms-pin-widget">
  if(localStorage.getItem("cms_auth") === "granted") {
    const path = window.location.pathname.split("/").filter(Boolean);
    let repo = "vietndj.github.io", file = "index.html";
    if (path.length > 1) { repo = path[0]; file = path.pop(); }
    else if (path.length === 1) { if (path[0].endsWith(".html")) file = path[0]; else repo = path[0]; }
    const fileKey = repo + "/" + decodeURIComponent(file);
    let isPinned = false;
    try { const dbStr = localStorage.getItem("cms_repo_data"); if(dbStr){ const db = JSON.parse(dbStr); if(Array.isArray(db.pinnedDataCache) && db.pinnedDataCache.includes(fileKey)) isPinned = true; } } catch(e){}
    const btn = document.createElement("a");
    btn.href = "https://vietndj.github.io/?" + (isPinned ? "unpin=" : "pin=") + encodeURIComponent(fileKey);
    btn.innerHTML = isPinned ? "❌ Bỏ ghim" : "📌 Ghim bài";
    btn.style.cssText = "position:fixed;top:15px;right:15px;background:" + (isPinned ? "#FF3B30" : "#FF9500") + ";color:white;padding:8px 16px;border-radius:20px;font-weight:bold;font-size:12px;z-index:99999;text-decoration:none;box-shadow:0 4px 10px rgba(0,0,0,0.15);transition:all 0.2s ease;cursor:pointer;";
    btn.onmouseover = () => btn.style.transform = "scale(1.05)";
    btn.onmouseout = () => btn.style.transform = "scale(1)";
    btn.onclick = function(e) {
      e.preventDefault();
      window.open(this.href, "_blank");
      isPinned = !isPinned;
      this.innerHTML = isPinned ? "❌ Bỏ ghim" : "📌 Ghim bài";
      this.style.background = isPinned ? "#FF3B30" : "#FF9500";
      this.href = "https://vietndj.github.io/?" + (isPinned ? "unpin=" : "pin=") + encodeURIComponent(fileKey);
    };
    document.body.appendChild(btn);
  }
</script>
