<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Feed | Kho Lưu Trữ</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #000; /* Nền đen giúp tập trung vào feed như Reels */
            margin: 0;
            overflow: hidden; /* Chặn cuộn body, chỉ cuộn feed container */
        }

        /* 1. Thiết lập vùng cuộn Feed (Scroll Snap) */
        .feed-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .feed-container::-webkit-scrollbar {
            display: none; /* Ẩn thanh cuộn cho giống app mobile */
        }

        /* Mỗi post cao đúng 1 màn hình và bắt buộc khựng lại */
        .feed-item {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 2. Style cho thẻ hiển thị nội dung (Card) */
        .feed-card {
            width: 100%;
            max-width: 800px;
            height: 85vh; /* Card cao 85% màn hình để có viền hở trên dưới */
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-col;
            overflow: hidden;
            position: relative;
            margin: 0 16px;
        }

        /* 3. Vùng chứa nội dung bài viết gốc & Hiệu ứng mờ (Fade out) */
        .post-content-wrapper {
            padding: 2rem;
            height: 100%;
            overflow-y: hidden; /* Cắt bớt nội dung bị thừa */
            position: relative;
        }

        /* Gradient làm mờ nội dung ở nửa dưới (Mô phỏng "lấy 1 nửa độ dài") */
        .content-fade-mask {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40vh; /* Độ cao của vùng mờ dần */
            background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 90%);
            z-index: 10;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 2rem;
        }

        /* Nút Tool góc */
        #dev-tools { position: fixed; bottom: 20px; right: 20px; z-index: 999; }
        .dev-btn {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px);
            color: white; border-radius: 50%; width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.2s; border: 1px solid rgba(255,255,255,0.1);
        }
        .dev-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="feed-container" class="feed-container">
        <div id="initial-loader" class="feed-item bg-gray-900 flex-col text-white">
            <svg class="animate-spin h-10 w-10 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <p class="font-medium">Đang tải luồng bài viết...</p>
        </div>
    </div>

    <div id="dev-tools">
        <button onclick="promptForToken()" class="dev-btn" id="token-btn">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </button>
    </div>

    <script>
        const CONFIG = {
            owner: 'vietndj',
            repo: 'k',
            ignoredFiles: ['index.html', 'fix-url.html', '404.html']
        };

        const TOKEN_KEY = 'vietndj_dev_pat';
        if(localStorage.getItem(TOKEN_KEY)) document.getElementById('token-btn').style.background = '#34c759';

        function promptForToken() {
            const currentToken = localStorage.getItem(TOKEN_KEY) || '';
            const action = prompt("Nhập GitHub PAT để test:\nĐể xóa, hãy xóa trắng ô bên dưới và ấn OK:", currentToken);
            if (action !== null) {
                if (action.trim() === '') localStorage.removeItem(TOKEN_KEY);
                else localStorage.setItem(TOKEN_KEY, action.trim());
                location.reload();
            }
        }

        function formatTitle(filename) {
            try {
                let decoded = decodeURIComponent(filename.replace(/\.html$/, ''));
                let readable = decoded.replace(/-/g, ' ');
                return readable.charAt(0).toUpperCase() + readable.slice(1);
            } catch (e) { return filename; }
        }

        // Tạo Intersection Observer để LAZY LOAD nội dung file html
        // Chỉ fetch file raw khi người dùng cuộn tới bài đó
        const observerOptions = {
            root: document.getElementById('feed-container'),
            rootMargin: '0px',
            threshold: 0.1 // Kích hoạt khi 10% thẻ hiện ra
        };

        const postObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const card = entry.target;
                    const downloadUrl = card.dataset.downloadUrl;
                    const isLoaded = card.dataset.loaded;

                    if (downloadUrl && isLoaded === 'false') {
                        loadRawContent(card, downloadUrl);
                        card.dataset.loaded = 'true'; // Đánh dấu đã load để không gọi lại
                    }
                }
            });
        }, observerOptions);

        // Hàm tải file raw HTML, parse và nhét vào card
        async function loadRawContent(cardElement, downloadUrl) {
            const contentContainer = cardElement.querySelector('.raw-content-inject');
            try {
                const response = await fetch(downloadUrl);
                if (!response.ok) throw new Error("Fetch content failed");
                const htmlText = await response.text();

                // Dùng DOMParser để bóc tách an toàn
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');
                
                // Lấy phần body (hoặc thẻ main nếu bạn dùng main trong bài viết)
                const mainContent = doc.querySelector('main') || doc.body;

                // Xóa các thẻ script để đảm bảo an toàn, không chạy mã JS lạ
                const scripts = mainContent.querySelectorAll('script');
                scripts.forEach(s => s.remove());

                // Inject nội dung vào feed
                contentContainer.innerHTML = mainContent.innerHTML;

            } catch (error) {
                console.error("Lỗi parse bài viết:", error);
                contentContainer.innerHTML = `<p class="text-red-500">Không thể tải nội dung bài viết này.</p>`;
            }
        }

        // Hàm chính: Lấy danh sách file và tạo các Khối Feed (Khung rỗng)
        async function fetchAndRenderFeed() {
            const container = document.getElementById('feed-container');
            
            try {
                const apiUrl = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents?t=${Date.now()}`;
                const fetchOptions = { method: 'GET', headers: {} };
                const savedToken = localStorage.getItem(TOKEN_KEY);
                if (savedToken) fetchOptions.headers['Authorization'] = `Bearer ${savedToken}`;

                const response = await fetch(apiUrl, fetchOptions);
                if (!response.ok) throw new Error(`Lỗi API: ${response.status}`);
                const data = await response.json();

                const posts = data.filter(item => item.type === 'file' && item.name.endsWith('.html') && !CONFIG.ignoredFiles.includes(item.name));
                
                document.getElementById('initial-loader').style.display = 'none';

                if (posts.length === 0) {
                    container.innerHTML = `<div class="feed-item text-white">Chưa có bài viết nào.</div>`;
                    return;
                }

                posts.reverse().forEach((post, index) => {
                    const title = formatTitle(post.name);
                    const postUrl = encodeURIComponent(post.name);
                    
                    // Khởi tạo khung Card (Sẽ load ruột sau bằng Lazy Load)
                    const feedItem = document.createElement('div');
                    feedItem.className = 'feed-item';
                    
                    // download_url là đường dẫn trực tiếp đến file raw của GitHub
                    feedItem.dataset.downloadUrl = post.download_url;
                    feedItem.dataset.loaded = 'false';

                    feedItem.innerHTML = `
                        <div class="feed-card">
                            <div class="px-8 py-5 border-b border-gray-100 bg-gray-50 flex justify-between items-center z-20 relative">
                                <h2 class="text-xl font-bold text-gray-900 truncate pr-4">${title}</h2>
                                <a href="./${postUrl}" target="_blank" class="shrink-0 bg-black text-white text-sm px-4 py-2 rounded-full font-medium hover:bg-gray-800 transition">
                                    Đọc trọn bộ
                                </a>
                            </div>

                            <div class="post-content-wrapper">
                                <div class="raw-content-inject prose prose-lg max-w-none text-gray-700">
                                    <div class="animate-pulse flex space-x-4 mt-4">
                                        <div class="flex-1 space-y-4 py-1">
                                            <div class="h-4 bg-gray-200 rounded w-3/4"></div>
                                            <div class="space-y-2">
                                                <div class="h-4 bg-gray-200 rounded"></div>
                                                <div class="h-4 bg-gray-200 rounded w-5/6"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="content-fade-mask">
                                    <a href="./${postUrl}" class="text-blue-600 font-semibold hover:underline flex items-center bg-white px-6 py-2 rounded-full shadow-md">
                                        Tiếp tục đọc <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    container.appendChild(feedItem);
                    // Bắt đầu quan sát thẻ này, nếu cuộn tới thì kích hoạt loadRawContent
                    postObserver.observe(feedItem);
                });

            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="feed-item flex-col text-red-500 bg-gray-900"><p>Lỗi: ${error.message}</p></div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', fetchAndRenderFeed);
    </script>
</body>
</html>
